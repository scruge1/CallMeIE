name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://callmeie.onrender.com/health)
            echo "Attempt $i: health check status $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Service is healthy"
              exit 0
            fi
            echo "Non-200 response, waiting 30s before retry..."
            sleep 30
          done
          echo "WARNING: health check failed after 3 attempts (last status: $STATUS)"
          exit 1
