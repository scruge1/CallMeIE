<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CallMe.ie Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 16px; }
  h1 { font-size: 1.3rem; font-weight: 700; color: #22d3ee; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 24px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab { padding: 8px 18px; border-radius: 6px; border: 1px solid #334155;
         background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.9rem; }
  .tab.active { background: #22d3ee; color: #0f172a; border-color: #22d3ee; font-weight: 600; }
  .badge { display: inline-block; background: #ef4444; color: #fff;
           border-radius: 99px; font-size: 0.7rem; padding: 1px 6px; margin-left: 4px; vertical-align: middle; }
  .section { display: none; }
  .section.active { display: block; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px;
          padding: 16px; margin-bottom: 12px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .biz-name { font-size: 1rem; font-weight: 700; }
  .biz-type { font-size: 0.75rem; background: #0e7490; color: #fff;
              padding: 2px 8px; border-radius: 99px; }
  .meta { font-size: 0.82rem; color: #94a3b8; margin-bottom: 10px; line-height: 1.6; }
  .meta strong { color: #cbd5e1; }
  .detail-row { font-size: 0.78rem; color: #64748b; margin-bottom: 4px; }
  .detail-row strong { color: #94a3b8; }
  details summary { font-size: 0.8rem; color: #475569; cursor: pointer;
                    margin-bottom: 8px; user-select: none; }
  details[open] summary { color: #22d3ee; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;
         font-size: 0.85rem; font-weight: 600; transition: opacity 0.15s; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-provision { background: #22d3ee; color: #0f172a; }
  .btn-reject { background: transparent; border: 1px solid #ef4444; color: #ef4444; }
  .btn-sms { background: transparent; border: 1px solid #334155; color: #94a3b8; font-size: 0.8rem; }
  .status-badge { font-size: 0.72rem; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
  .status-pending { background: #92400e; color: #fde68a; }
  .status-provisioned { background: #065f46; color: #6ee7b7; }
  .status-rejected { background: #3f3f46; color: #a1a1aa; }
  .status-active { background: #065f46; color: #6ee7b7; }
  .empty { text-align: center; color: #475569; padding: 40px 20px; font-size: 0.9rem; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b;
           border: 1px solid #334155; border-radius: 8px; padding: 12px 16px;
           font-size: 0.85rem; max-width: 280px; z-index: 999;
           transition: opacity 0.3s; }
  .toast.success { border-color: #22d3ee; color: #22d3ee; }
  .toast.error { border-color: #ef4444; color: #ef4444; }
  .token-screen { max-width: 360px; margin: 80px auto; text-align: center; }
  .token-screen input { width: 100%; padding: 12px; background: #1e293b;
                        border: 1px solid #334155; border-radius: 8px; color: #e2e8f0;
                        font-size: 1rem; margin: 16px 0; text-align: center; }
  .token-screen .btn { width: 100%; padding: 12px; background: #22d3ee; color: #0f172a; font-size: 1rem; }
  #main { display: none; }
  .assist-id { font-size: 0.72rem; font-family: monospace; color: #475569;
               background: #0f172a; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>

<div id="tokenScreen" class="token-screen">
  <h1>CallMe.ie Admin</h1>
  <p style="color:#64748b;margin-top:8px;font-size:0.9rem;">Enter your admin token to continue</p>
  <input type="password" id="tokenInput" placeholder="Admin token" autocomplete="off">
  <button class="btn" onclick="login()">Enter</button>
</div>

<div id="main">
  <h1>CallMe.ie Admin</h1>
  <div class="subtitle" id="subtitle">Loading...</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('pending')">
      Queue <span id="pendingBadge" class="badge" style="display:none"></span>
    </button>
    <button class="tab" onclick="switchTab('clients')">Active Clients</button>
  </div>

  <div id="pendingSection" class="section active"></div>
  <div id="clientsSection" class="section"></div>
</div>

<div id="toast" class="toast" style="display:none"></div>

<script>
let TOKEN = '';
const BASE = window.location.origin;

function login() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) return;
  TOKEN = t;
  sessionStorage.setItem('admin_token', t);
  document.getElementById('tokenScreen').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  loadAll();
}

// Check sessionStorage or URL param on load
window.onload = () => {
  const params = new URLSearchParams(window.location.search);
  const t = params.get('token') || sessionStorage.getItem('admin_token');
  if (t) {
    TOKEN = t;
    document.getElementById('tokenScreen').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    loadAll();
  }
  document.getElementById('tokenInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
};

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'pending') || (i === 1 && tab === 'clients'));
  });
  document.getElementById('pendingSection').classList.toggle('active', tab === 'pending');
  document.getElementById('clientsSection').classList.toggle('active', tab === 'clients');
}

async function loadAll() {
  await Promise.all([loadSubmissions(), loadClients()]);
}

async function loadSubmissions() {
  const res = await fetch(`${BASE}/admin/api/submissions?token=${TOKEN}`);
  if (res.status === 401) { showToast('Invalid token', 'error'); return; }
  const data = await res.json();
  const pending = data.filter(s => s.status === 'pending');
  const badge = document.getElementById('pendingBadge');
  if (pending.length > 0) {
    badge.textContent = pending.length;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }

  const el = document.getElementById('pendingSection');
  if (data.length === 0) {
    el.innerHTML = '<div class="empty">No submissions yet.<br>Share the onboarding link with your next prospect.</div>';
    return;
  }

  el.innerHTML = data.map(s => `
    <div class="card" id="sub-${s.id}">
      <div class="card-header">
        <div>
          <div class="biz-name">${esc(s.business_name)}</div>
          <div style="margin-top:4px">
            ${s.business_type ? `<span class="biz-type">${esc(s.business_type)}</span>` : ''}
            <span class="status-badge status-${s.status}" style="margin-left:4px">${s.status}</span>
          </div>
        </div>
        <div style="font-size:0.75rem;color:#475569;text-align:right">${fmtDate(s.created_at)}</div>
      </div>
      <div class="meta">
        <strong>Contact:</strong> ${esc(s.contact_name || '—')} · ${esc(s.contact_phone || '—')}<br>
        ${s.contact_email ? `<strong>Email:</strong> ${esc(s.contact_email)}<br>` : ''}
        ${s.plan ? `<strong>Plan:</strong> ${esc(s.plan)}<br>` : ''}
        ${s.ai_name ? `<strong>AI Name:</strong> ${esc(s.ai_name)}<br>` : ''}
      </div>
      <details>
        <summary>View full details</summary>
        ${s.address ? `<div class="detail-row"><strong>Address:</strong> ${esc(s.address)}</div>` : ''}
        ${s.hours ? `<div class="detail-row"><strong>Hours:</strong> ${esc(s.hours)}</div>` : ''}
        ${s.services ? `<div class="detail-row"><strong>Services:</strong> ${esc(s.services)}</div>` : ''}
        ${s.emergency_number ? `<div class="detail-row"><strong>Emergency #:</strong> ${esc(s.emergency_number)}</div>` : ''}
        ${s.calendar_email ? `<div class="detail-row"><strong>Calendar:</strong> ${esc(s.calendar_email)}</div>` : ''}
        ${s.notes ? `<div class="detail-row"><strong>Notes:</strong> ${esc(s.notes)}</div>` : ''}
        ${s.vapi_assistant_id ? `<div class="detail-row"><strong>Assistant:</strong> <span class="assist-id">${s.vapi_assistant_id}</span></div>` : ''}
      </details>
      ${s.status === 'pending' ? `
      <div class="actions" style="margin-top:12px">
        <button class="btn btn-provision" id="prov-${s.id}" onclick="provision(${s.id})">Provision</button>
        <button class="btn btn-reject" onclick="reject(${s.id})">Reject</button>
        ${s.contact_phone ? `<button class="btn btn-sms" onclick="copyPhone('${esc(s.contact_phone)}')">Copy phone</button>` : ''}
      </div>` : ''}
    </div>
  `).join('');

  const total = data.length;
  const prov = data.filter(s => s.status === 'provisioned').length;
  document.getElementById('subtitle').textContent =
    `${pending.length} pending · ${prov} provisioned · ${total} total`;
}

async function loadClients() {
  const res = await fetch(`${BASE}/admin/api/clients?token=${TOKEN}`);
  if (!res.ok) return;
  const data = await res.json();
  const el = document.getElementById('clientsSection');
  if (data.length === 0) {
    el.innerHTML = '<div class="empty">No provisioned clients yet.</div>';
    return;
  }
  el.innerHTML = data.map(c => `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="biz-name">${esc(c.name)}</div>
          <span class="status-badge status-${c.status}" style="margin-top:4px;display:inline-block">${c.status}</span>
        </div>
        <div style="font-size:0.75rem;color:#475569;text-align:right">${fmtDate(c.created_at)}</div>
      </div>
      <div class="meta">
        <strong>Assistant ID:</strong><br>
        <span class="assist-id">${c.assistant_id}</span>
      </div>
      <div class="meta">
        <strong>Owner #:</strong> ${c.owner_phone || '—'} ·
        <strong>From #:</strong> ${c.from_number || '—'}<br>
        <strong>Calendar:</strong> ${c.calendar_id || 'primary'}
      </div>
      <div class="actions">
        <button class="btn btn-sms" onclick="copyText('${c.assistant_id}')">Copy assistant ID</button>
      </div>
    </div>
  `).join('');
}

async function provision(id) {
  const btn = document.getElementById(`prov-${id}`);
  btn.disabled = true;
  btn.textContent = 'Provisioning...';
  try {
    const res = await fetch(`${BASE}/admin/api/provision/${id}?token=${TOKEN}`, { method: 'POST' });
    const data = await res.json();
    if (res.ok) {
      showToast(`Provisioned! Assistant: ${data.assistant_id.substring(0,8)}...`, 'success');
      await loadAll();
    } else {
      showToast(data.detail || 'Provision failed', 'error');
      btn.disabled = false;
      btn.textContent = 'Provision';
    }
  } catch(e) {
    showToast('Network error', 'error');
    btn.disabled = false;
    btn.textContent = 'Provision';
  }
}

async function reject(id) {
  if (!confirm('Reject this submission?')) return;
  await fetch(`${BASE}/admin/api/reject/${id}?token=${TOKEN}`, { method: 'POST' });
  showToast('Rejected', 'error');
  await loadSubmissions();
}

function copyPhone(phone) {
  navigator.clipboard.writeText(phone);
  showToast('Phone copied', 'success');
}
function copyText(text) {
  navigator.clipboard.writeText(text);
  showToast('Copied!', 'success');
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3500);
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s + (s.endsWith('Z') ? '' : 'Z'));
  return d.toLocaleDateString('en-IE', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}
</script>
</body>
</html>
